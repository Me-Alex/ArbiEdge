<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta
      name="description"
      content="A normalized view of upcoming football bookmaker odds."
    >
    <title>Odds dashboard</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23adf22f'/%3E%3Cpath d='M17 42V22h12c8 0 13 4 13 10s-5 10-13 10H17Zm9-7h3c3 0 5-1 5-3s-2-3-5-3h-3v6Z' fill='%2306152a'/%3E%3C/svg%3E"
    >
    <link rel="stylesheet" href="/css/style.css">
    <script src="/getapi.js" defer></script>
  </head>
  <body>
    <main class="shell">
      <header class="page-header">
        <div>
          <h1>Odds dashboard</h1>
          <p class="subtitle">Football prices in one normalized view.</p>
        </div>
      </header>

      <section class="toolbar" aria-label="Dashboard controls">
        <dl class="metadata">
          <div>
            <dt>Data mode</dt>
            <dd>
              <span class="status-dot" id="status-dot"></span>
              <span id="data-mode">Loading</span>
            </dd>
          </div>
          <div>
            <dt>Last updated</dt>
            <dd id="last-updated">—</dd>
          </div>
        </dl>

        <div class="actions">
          <label class="filter-control">
            <span>Filter teams or competitions</span>
            <input
              id="filter"
              type="search"
              autocomplete="off"
              placeholder="Filter teams or competitions"
            >
          </label>
          <button id="refresh" type="button">
            <svg
              aria-hidden="true"
              viewBox="0 0 24 24"
              width="18"
              height="18"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 11a8.1 8.1 0 0 0-15.5-2M4 4v5h5"></path>
              <path d="M4 13a8.1 8.1 0 0 0 15.5 2M20 20v-5h-5"></path>
            </svg>
            <span>Refresh odds</span>
          </button>
        </div>
      </section>

      <aside id="warning" class="warning" hidden>
        <strong>Demo data</strong>
        <span id="warning-message"></span>
      </aside>

      <p id="announcement" class="sr-only" aria-live="polite"></p>

      <section id="loading" class="state-panel" aria-live="polite">
        Loading football odds…
      </section>
      <section id="error" class="state-panel state-panel--error" hidden>
        <strong>Odds could not be loaded.</strong>
        <span id="error-message">Try refreshing the page.</span>
      </section>
      <section id="empty" class="state-panel" hidden>
        No events match this filter.
      </section>

      <section
        id="events"
        class="events"
        aria-label="Upcoming football events"
      ></section>
    </main>
  </body>
</html>
