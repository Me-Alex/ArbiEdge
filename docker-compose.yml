services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: odds_dashboard
      POSTGRES_USER: odds_dashboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD outside the repository}
    volumes:
      - odds-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odds_dashboard -d odds_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      AUTONOMY_ENABLED: 1
      PRODUCTION_FAIL_CLOSED: 1
      DATABASE_URL: postgres://odds_dashboard:${POSTGRES_PASSWORD}@postgres:5432/odds_dashboard
      AUTONOMY_FIDELITY_ENABLED: ${AUTONOMY_FIDELITY_ENABLED:-1}
      RESULTS_ENABLED: ${RESULTS_ENABLED:-0}
      RESULTS_API_KEY: ${RESULTS_API_KEY:-}
      RESULTS_SPORT_KEYS: ${RESULTS_SPORT_KEYS:-soccer_fifa_world_cup}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      LOG_JSON: 1
    volumes:
      - odds-app-data:/app/data
      - odds-app-output:/app/output

volumes:
  odds-postgres:
  odds-app-data:
  odds-app-output:
